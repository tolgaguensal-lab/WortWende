<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B45"/>
      <stop offset="100%" stop-color="#153656"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B4A"/>
      <stop offset="100%" stop-color="#FFC24D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- W Letter -->
  <text x="512" y="680" font-family="'Nunito', system-ui, sans-serif" font-size="620" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-20">W</text>
  <!-- Dot accent -->
  <circle cx="780" cy="340" r="48" fill="#FFC24D" opacity="0.9"/>
</svg>
